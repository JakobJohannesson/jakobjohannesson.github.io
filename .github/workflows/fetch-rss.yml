name: Fetch Press Releases

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Cision RSS feed
        run: python scripts/cision_rss_reader.py

      - name: Fetch MFN feed
        run: python scripts/mfn_rss_reader.py

      - name: Generate feed page
        run: python scripts/generate_feed_page.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss_feed/ feed.html
          if git diff --cached --quiet; then
            echo "No new items found."
          else
            git commit -m "Add new press releases from feeds"
            git push
          fi
